/*
 * Messages (TON specific) for KeepKey Communication
 *
 */

syntax = "proto2";

// Sugar for easier handling in Java
option java_package = "com.keepkey.deviceprotocol";
option java_outer_classname = "KeepKeyMessageTon";

/**
 * Request: Ask device for TON address corresponding to address_n path
 * @next PassphraseRequest
 * @next TonAddress
 * @next Failure
 */
message TonGetAddress {
    repeated uint32 address_n = 1;                // BIP-32 path to derive the key from master node
    optional string coin_name = 2 [default='Ton'];
    optional bool show_display = 3;               // optionally show on display before sending the result
    optional bool bounceable = 4 [default=true];  // bounceable flag for address encoding
    optional bool testnet = 5 [default=false];    // testnet flag for address encoding
    optional sint32 workchain = 6 [default=0];    // workchain ID (-1 or 0)
}

/**
 * Response: Contains a TON address derived from device private seed
 * @prev TonGetAddress
 */
message TonAddress {
    optional string address = 1;                  // TON address in user-friendly Base64 encoding
    optional string raw_address = 2;              // TON address in raw format (workchain:hash)
}

/**
 * Request: ask device to sign TON transaction
 *
 * Two modes:
 * 1. Clear-signing (preferred): provide to_address + amount + seqno + expire_at.
 *    Device reconstructs the v4r2 unsigned body cell, computes its hash,
 *    and verifies it matches raw_tx before signing. Shows "TON Transfer"
 *    confirmation with verified amount and recipient.
 *
 * 2. Blind-signing (fallback): provide only raw_tx. Device signs the hash
 *    directly with a blind-sign warning. Used for non-standard transactions.
 *
 * @start
 * @next TonSignedTx
 */
message TonSignTx {
    repeated uint32 address_n = 1;                // BIP-32 path to derive the key from master node
    optional string coin_name = 2 [default='Ton'];
    optional bytes raw_tx = 3;                    // 32-byte unsigned body cell hash (always required)
    optional uint32 expire_at = 4;                // Transaction expiration timestamp
    optional uint32 seqno = 5;                    // Wallet sequence number
    optional sint32 workchain = 6 [default=0];    // Destination workchain ID (-1 or 0)
    optional string to_address = 7;               // Destination address (user-friendly base64)
    optional uint64 amount = 8;                   // Transfer amount in nanoTON
    // Clear-signing fields (new)
    optional bool bounce = 9;                     // Message bounce flag (default true for clear-sign)
    optional string memo = 10;                    // Optional text memo/comment
    optional bool is_deploy = 11;                 // True if wallet needs StateInit (first tx)
}

/**
 * Response: signature for transaction
 * @end
 */
message TonSignedTx {
    optional bytes signature = 1;                 // Ed25519 signature (64 bytes)
}

//////////////////////////////////////
// TON: Message signing             //
//////////////////////////////////////

/**
 * Request: Ask device to sign an arbitrary message with Ed25519
 * Note: lacks domain separation by default. Firmware policy may gate
 * this behind AdvancedMode (matching the SolanaSignMessage pattern)
 * until a TON Connect-style envelope (ton_proof) is implemented.
 * @next TonMessageSignature
 * @next Failure
 */
message TonSignMessage {
    repeated uint32 address_n = 1;                // BIP-32 path to derive the key from master node
    optional string coin_name = 2 [default='Ton'];
    optional bytes message = 3;                   // Message bytes to sign
    optional bool show_display = 4;               // Show message on device display
}

/**
 * Response: Ed25519 signature and public key for the signed message
 * @prev TonSignMessage
 */
message TonMessageSignature {
    optional bytes public_key = 1;                // 32-byte Ed25519 public key
    optional bytes signature = 2;                 // 64-byte Ed25519 signature
}
