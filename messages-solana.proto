/*
 * Messages (Solana specific) for KeepKey Communication
 *
 * Solana address derivation, transaction signing, and message signing
 * via Ed25519 on the device.
 */

syntax = "proto2";

// Sugar for easier handling in Java
option java_package = "com.keepkey.deviceprotocol";
option java_outer_classname = "KeepKeyMessageSolana";

/**
 * Request: Ask device for Solana address corresponding to address_n path
 * @next SolanaAddress
 * @next Failure
 */
message SolanaGetAddress {
    repeated uint32 address_n = 1;          // BIP-32/BIP-44 path (e.g. m/44'/501'/0'/0')
    optional string coin_name = 2 [default = "Solana"];
    optional bool show_display = 3;         // optionally show on display before sending the result
}

/**
 * Response: Contains Solana address (Base58-encoded Ed25519 public key)
 * @prev SolanaGetAddress
 */
message SolanaAddress {
    optional string address = 1;            // Base58-encoded Solana address
}

/**
 * Host-provided token metadata for SPL token display
 */
message SolanaTokenInfo {
    optional bytes mint = 1;                // 32-byte mint public key
    optional string symbol = 2;            // Token symbol e.g. "USDC" (max 12)
    optional uint32 decimals = 3;          // Token decimals e.g. 6
}

/**
 * Request: Ask device to sign a raw Solana transaction
 * @next SolanaSignedTx
 * @next Failure
 */
message SolanaSignTx {
    repeated uint32 address_n = 1;          // BIP-32/BIP-44 path to signing key
    optional string coin_name = 2 [default = "Solana"];
    optional bytes raw_tx = 3;              // Serialized Solana transaction bytes
    repeated SolanaTokenInfo token_info = 4; // Token metadata for display (max 4)
}

/**
 * Response: Contains Ed25519 signature of the transaction
 * @prev SolanaSignTx
 */
message SolanaSignedTx {
    optional bytes signature = 1;           // 64-byte Ed25519 signature
}

/**
 * Request: Ask device to sign an arbitrary message with Ed25519
 * @next SolanaMessageSignature
 * @next Failure
 */
message SolanaSignMessage {
    repeated uint32 address_n = 1;          // BIP-32/BIP-44 path to signing key
    optional string coin_name = 2 [default = "Solana"];
    optional bytes message = 3;             // Arbitrary message bytes to sign
    optional bool show_display = 4;         // Show message on device display
}

/**
 * Response: Contains Ed25519 signature and public key for the signed message
 * @prev SolanaSignMessage
 */
message SolanaMessageSignature {
    optional bytes public_key = 1;          // 32-byte Ed25519 public key
    optional bytes signature = 2;           // 64-byte Ed25519 signature
}

/**
 * Request: Ask device to sign a Solana off-chain message with domain separation
 *
 * Per the Solana off-chain message spec, the device signs over the envelope:
 *   "\xff" || "solana offchain" || <version:u8> || <format:u8>
 *           || <message_length:u16 LE> || <message bytes>
 *
 * The "\xff" lead byte is invalid as a Solana transaction prefix, providing
 * domain separation that plain SolanaSignMessage lacks. Firmware constructs
 * the envelope from the components below; host supplies version/format/message.
 *
 * Format values (KeepKey supports formats 0 and 1 only; max message size 1212 bytes):
 *   0 = Restricted ASCII (printable, max 1212 bytes) — renderable on display
 *   1 = UTF-8 (max 1212 bytes) — renderable, may need policy gate
 *
 * @next SolanaOffchainMessageSignature
 * @next Failure
 */
message SolanaSignOffchainMessage {
    repeated uint32 address_n = 1;          // BIP-32/BIP-44 path to signing key
    optional string coin_name = 2 [default = "Solana"];
    optional uint32 version = 3 [default = 0];   // Off-chain message spec version (0 = current)
    optional uint32 message_format = 4;          // 0=ASCII, 1=UTF8 (format 2 not supported)
    optional bytes message = 5;                  // Raw message payload (firmware wraps with envelope)
    optional bool show_display = 6;              // Show message on device display
}

/**
 * Response: Ed25519 signature over the off-chain message envelope
 * @prev SolanaSignOffchainMessage
 */
message SolanaOffchainMessageSignature {
    optional bytes public_key = 1;          // 32-byte Ed25519 public key
    optional bytes signature = 2;           // 64-byte Ed25519 signature over the envelope
}
